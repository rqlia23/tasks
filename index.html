<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App de Tareas</title>

  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
    }

    .dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .app {
      max-width: 400px;
      margin: auto;
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    #themeToggle {
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .filters button {
      background: #e2e8f0;
      color: #0f172a;
    }

    .filters button.active {
      background: #22c55e;
      color: white;
    }

    #taskCount {
      text-align: center;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: grab;
      animation: fadeIn 0.2s ease;
    }

    li:active {
      cursor: grabbing;
    }

    li.drag-over {
      border: 2px dashed #22c55e;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    span {
      transition: all 0.3s ease;
      flex: 1;
    }

    .done {
      text-decoration: line-through;
      color: gray;
      opacity: 0.6;
      transform: scale(0.98);
    }

    li button {
      background: transparent;
      border: none;
      cursor: pointer;
    }

    li input {
      border: 1px solid #22c55e;
      border-radius: 5px;
      padding: 5px;
      flex: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="app">

  <h1>📝 Mis tareas</h1>

  <button id="themeToggle">🌙 Modo oscuro</button>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Añadir tarea...">
    <button onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button onclick="setFilter(event,'all')" class="active">Todas</button>
    <button onclick="setFilter(event,'pending')">Pendientes</button>
    <button onclick="setFilter(event,'done')">Completadas</button>
  </div>

  <p id="taskCount"></p>

  <ul id="taskList"></ul>

</div>

<script>

let tasks = [];
let currentFilter = "all";
let draggedItemIndex = null;

const toggleBtn = document.getElementById("themeToggle");

/* 🌙 DARK MODE */
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

toggleBtn.onclick = () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  toggleBtn.textContent = isDark ? "☀️ Modo claro" : "🌙 Modo oscuro";
};

/* 🎯 FILTROS */
function setFilter(event, filter) {
  currentFilter = filter;

  document.querySelectorAll(".filters button").forEach(btn =>
    btn.classList.remove("active")
  );

  event.target.classList.add("active");

  renderTasks();
}

/* ➕ ADD */
function addTask() {
  const input = document.getElementById("taskInput");

  if (input.value === "") return;

  tasks.push({ text: input.value, done: false });

  saveTasks();
  renderTasks();

  input.value = "";
}

/* 💾 STORAGE */
function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadTasks() {
  const stored = localStorage.getItem("tasks");
  if (stored) tasks = JSON.parse(stored);
}

/* 🎨 RENDER */
function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {

    if (currentFilter === "pending" && task.done) return;
    if (currentFilter === "done" && !task.done) return;

    const li = document.createElement("li");

    /* DRAG */
    li.draggable = true;
    li.ondragstart = () => draggedItemIndex = index;
    li.ondragover = e => e.preventDefault();
    li.ondragenter = () => li.classList.add("drag-over");
    li.ondragleave = () => li.classList.remove("drag-over");

    li.ondrop = () => {
      li.classList.remove("drag-over");

      const temp = tasks[draggedItemIndex];
      tasks.splice(draggedItemIndex, 1);
      tasks.splice(index, 0, temp);

      saveTasks();
      renderTasks();
    };

    const label = document.createElement("label");

    /* CHECKBOX */
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = task.done;

    checkbox.onchange = () => {
      tasks[index].done = checkbox.checked;
      saveTasks();
      renderTasks();
    };

    /* TEXTO */
    const span = document.createElement("span");
    span.textContent = task.text;

    if (task.done) span.classList.add("done");

    /* ✏️ EDICIÓN INLINE */
    span.addEventListener("dblclick", (e) => {
      e.stopPropagation();

      const input = document.createElement("input");
      input.value = task.text;

      li.replaceChild(input, span);
      input.focus();

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveEdit();
      });

      input.addEventListener("blur", saveEdit);

      function saveEdit() {
        if (input.value.trim() !== "") {
          tasks[index].text = input.value;
          saveTasks();
        }
        renderTasks();
      }
    });

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "❌";

    deleteBtn.onclick = () => {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    };

    label.appendChild(checkbox);
    label.appendChild(span);

    li.appendChild(label);
    li.appendChild(deleteBtn);

    list.appendChild(li);
  });

  const pending = tasks.filter(t => !t.done).length;

  document.getElementById("taskCount").textContent =
    `Tareas pendientes: ${pending}`;
}

/* INIT */
loadTasks();
renderTasks();

</script>

</body>
</html>
